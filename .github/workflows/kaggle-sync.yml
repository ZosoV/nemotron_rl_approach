name: Sync to Kaggle Dataset

on:
  push:
    branches: [main]
    paths:
      - "nemotron_grpo/**"
      - "notebooks/**"
      - "pyproject.toml"
      - "CLAUDE.md"
      - "README.md"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Kaggle dataset
        uses: jaimevalero/push-kaggle-dataset@v3.2
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        with:
          id: "zosov07/nemotron-rl-approach"
          title: "nemotron-rl-approach"
          files: |
            nemotron_grpo
            notebooks
            pyproject.toml
            CLAUDE.md
            README.md
