name: Sync to Kaggle Dataset

on:
  push:
    branches: [main]
    paths:
      - "nemotron_grpo/**"
      - "notebooks/**"
      - "pyproject.toml"
      - "CLAUDE.md"
      - "README.md"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Prepare upload directory
        run: |
          mkdir -p /tmp/kaggle_upload
          cp -r nemotron_grpo notebooks pyproject.toml CLAUDE.md README.md /tmp/kaggle_upload/
          cp dataset-metadata.json /tmp/kaggle_upload/

      - name: Sync to Kaggle (create or update)
        run: |
          cd /tmp/kaggle_upload
          if kaggle datasets status zosov07/nemotron-rl-approach 2>&1 | grep -qv "404\|error\|Error"; then
            echo "Dataset exists — creating new version"
            kaggle datasets version -p . -m "Auto-sync from GitHub ${{ github.sha }}" --dir-mode tar
          else
            echo "Dataset not found — creating it"
            kaggle datasets create -p . --dir-mode tar
          fi
